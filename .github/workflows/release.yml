name: Build and Package

# Builds standalone installers for macOS, Windows, and Linux on tag push.
# Each installer bundles the official llama.cpp build (binary + libraries)
# so end users need no Homebrew / apt / manual llama.cpp install. Only the
# 1.9 GB model downloads on first launch (handled by the app's setup page).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  LLAMA_TAG: b9905          # official llama.cpp release to bundle
  GO_VERSION: '1.23'

jobs:
  # ── macOS .dmg ─────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Compute version
        # On a v* tag this is a real semver (v0.2.0 -> 0.2.0). On a manual
        # workflow_dispatch (no tag), GITHUB_REF_NAME is the branch name
        # (e.g. "main"), which dpkg-deb rejects outright as a Debian version
        # — fall back to a dev placeholder so ad-hoc test runs still package.
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0-dev"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build ofin binary
        working-directory: engine
        run: go build -tags sqlite_fts5 -o bin/ofin-darwin-arm64 ./cmd/ofin

      - name: Fetch official llama.cpp (macOS arm64)
        run: |
          curl -L -o llama.tar.gz \
            "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/llama-${LLAMA_TAG}-bin-macos-arm64.tar.gz"
          mkdir -p llama-dist && tar xzf llama.tar.gz -C llama-dist --strip-components=1

      - name: Fetch embedding model
        run: |
          mkdir -p models-dev
          curl -L -o models-dev/bge-small-en-v1.5-f16.gguf \
            "https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-f16.gguf"

      - name: Build .dmg
        env:
          LLAMA_DIR: ${{ github.workspace }}/llama-dist
        run: bash packaging/macos/create-dmg.sh "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with: { name: ofin-macos-dmg, path: packaging/macos/*.dmg }

  # ── Windows .exe installer ─────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Compute version
        # Same fallback as the macOS/Linux jobs (see there for why).
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0-dev"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Provide sqlite3.h for cgo
        # sqlite-vec-go-bindings' cgo package #includes "sqlite3.h" directly;
        # macOS gets it from Xcode CLT and Linux from libsqlite3-dev, but
        # windows-latest has neither. vcpkg's sqlite3 port declares its API
        # `__declspec(dllimport)` (built for its own DLL), which breaks static
        # linkage with "undefined reference to __imp_sqlite3_*" since the
        # actual symbols come from mattn/go-sqlite3's bundled amalgamation
        # compiled into the same binary, not a DLL. Reuse go-sqlite3's own
        # vendored header instead: same version already pinned in go.sum,
        # and its SQLITE_API macro is plain (no dllimport) by default.
        working-directory: engine
        shell: pwsh
        run: |
          go mod download github.com/mattn/go-sqlite3
          $pkgDir = go list -m -f '{{.Dir}}' github.com/mattn/go-sqlite3
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\sqlite3-include" | Out-Null
          Copy-Item "$pkgDir\sqlite3-binding.h" "$env:RUNNER_TEMP\sqlite3-include\sqlite3.h"
          echo "CGO_CFLAGS=-I$env:RUNNER_TEMP\sqlite3-include" >> $env:GITHUB_ENV

      - name: Build ofin.exe
        working-directory: engine
        run: go build -tags sqlite_fts5 -o bin/ofin.exe ./cmd/ofin

      - name: Fetch official llama.cpp (Windows x64)
        shell: bash
        run: |
          curl -L -o llama.zip \
            "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/llama-${LLAMA_TAG}-bin-win-cpu-x64.zip"
          mkdir -p packaging/windows/bin/llama
          unzip -o llama.zip -d packaging/windows/bin/llama

      - name: Fetch embedding model + stage assets
        shell: bash
        run: |
          cp engine/bin/ofin.exe packaging/windows/bin/ofin.exe
          cp data/ofin.db packaging/windows/bin/ofin.db
          curl -L -o packaging/windows/bin/bge-small-en-v1.5-f16.gguf \
            "https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-f16.gguf"

      - name: Setup NSIS
        # choco installs makensis.exe to Program Files, but it updates the
        # machine PATH in the registry, which the already-running Actions
        # runner process doesn't pick up — subsequent steps still see the
        # old PATH. Append the install dir via $GITHUB_PATH instead, which
        # Actions honors for every later step regardless of OS env caching.
        shell: pwsh
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Compile installer
        working-directory: packaging/windows
        shell: cmd
        run: makensis /DVERSION=${{ steps.version.outputs.version }} ofin.nsi

      - uses: actions/upload-artifact@v4
        with: { name: ofin-windows-exe, path: packaging/windows/Ofin-Setup-*.exe }

  # ── Linux .deb ─────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Compute version
        # On a v* tag this is a real semver (v0.2.0 -> 0.2.0). On a manual
        # workflow_dispatch (no tag), GITHUB_REF_NAME is the branch name
        # (e.g. "main"), which dpkg-deb rejects outright as a Debian version
        # — fall back to a dev placeholder so ad-hoc test runs still package.
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0-dev"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build ofin binary
        working-directory: engine
        run: go build -tags sqlite_fts5 -o bin/ofin-linux-x86_64 ./cmd/ofin

      - name: Fetch official llama.cpp (Ubuntu x64)
        run: |
          curl -L -o llama.tar.gz \
            "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/llama-${LLAMA_TAG}-bin-ubuntu-x64.tar.gz"
          mkdir -p llama-dist && tar xzf llama.tar.gz -C llama-dist --strip-components=1

      - name: Fetch embedding model
        run: |
          mkdir -p models-dev
          curl -L -o models-dev/bge-small-en-v1.5-f16.gguf \
            "https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-f16.gguf"

      - name: Build .deb
        env:
          LLAMA_DIR: ${{ github.workspace }}/llama-dist
        run: bash packaging/linux/build-deb.sh "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with: { name: ofin-linux-deb, path: packaging/linux/*.deb }

  # ── GitHub Release ─────────────────────────────────────────
  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # Repo default workflow token permission is read-only (Settings > Actions
    # > General), so softprops/action-gh-release got a 403 creating the
    # release. Grant contents:write to just this job, not repo-wide.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: release }
      - run: find release -type f -ls
      - uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          generate_release_notes: true
