<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12A06E"/>
      <stop offset="1" stop-color="#0A5F42"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="228" fill="url(#sheen)"/>

  <!-- Balance scale, drawn in white -->
  <g stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#soft)">
    <!-- Central pillar -->
    <path d="M512 250 V774"/>
    <!-- Base -->
    <path d="M396 800 H628"/>
    <!-- Beam -->
    <path d="M300 340 H724"/>
    <!-- Top knob -->
    <circle cx="512" cy="250" r="30" fill="#ffffff" stroke="none"/>
    <!-- Left hanger lines -->
    <path d="M300 340 L232 520"/>
    <path d="M300 340 L368 520"/>
    <!-- Right hanger lines -->
    <path d="M724 340 L656 520"/>
    <path d="M724 340 L792 520"/>
  </g>

  <!-- Left pan -->
  <path d="M212 520 H388 A88 88 0 0 1 212 520 Z" fill="#ffffff" opacity="0.96"/>
  <!-- Right pan -->
  <path d="M636 520 H812 A88 88 0 0 1 636 520 Z" fill="#ffffff" opacity="0.96"/>
</svg>
